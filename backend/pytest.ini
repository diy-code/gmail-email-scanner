[pytest]
# Add backend/ to sys.path so imports like `from models import ...` resolve
pythonpath = .

# pytest-asyncio: auto mode means no @pytest.mark.asyncio needed on each test
asyncio_mode = auto

# Default test discovery root
testpaths = tests

# Custom markers — run smoke tests only when SMOKE_URL is set
markers =
    smoke: live end-to-end smoke tests against a deployed backend (skipped by default)
    integration: tests that spin up the FastAPI app with mocked external APIs
    unit: pure logic / helper function tests with no I/O

# Show short tracebacks by default; increase verbosity with -v
addopts = -ra --tb=short
